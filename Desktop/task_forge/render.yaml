services:
  - type: web
    name: taskforge
    runtime: python
    rootDir: taskforge
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py ensure_superuser"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: taskforge-db
          property: connectionString
      - key: SITE_URL
        value: "https://task-forge-0dwp.onrender.com"
      - key: ALLOWED_HOSTS
        value: "task-forge-0dwp.onrender.com"
      - key: EMAIL_HOST_USER
        sync: false    # set manually in Render dashboard
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: TASKFORGE_ADMIN_EMAILS
        sync: false
      - key: GOOGLE_OAUTH2_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH2_CLIENT_SECRET
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false    # set in Render dashboard
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false    # set in Render dashboard
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false    # set in Render dashboard (optional)

databases:
  - name: taskforge-db
    plan: free
